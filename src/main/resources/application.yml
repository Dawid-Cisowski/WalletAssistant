spring:
  application:
    name: wallet-assistant

  threads:
    virtual:
      enabled: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wallet_assistant}
    username: ${SPRING_DATASOURCE_USERNAME:wallet}
    password: ${SPRING_DATASOURCE_PASSWORD:wallet}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    lock-retry-count: 50

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
      republish-outstanding-events-on-restart: true

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=${NONCE_CACHE_TTL_SEC:600}s,maximumSize=10000

  ai:
    mcp:
      server:
        enabled: ${MCP_ENABLED:false}
        name: wallet-assistant
        version: 1.0.0
        base-url: ${MCP_BASE_URL:}
        protocol: STREAMABLE

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    org.dawid.cisowski.walletassistant: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN

app:
  hmac:
    devices-json: ${HMAC_DEVICES_JSON:}
    tolerance-seconds: ${HMAC_TOLERANCE_SEC:600}
  nonce:
    cache-ttl-seconds: ${NONCE_CACHE_TTL_SEC:600}
  api-key:
    enabled: ${API_KEY_ENABLED:false}
    key: ${API_KEY:changeme-this-is-not-real-key-and-too-short}
    device-id: ${API_KEY_DEVICE_ID:claude-ai}
    read-only: ${API_KEY_READ_ONLY:false}
  batch:
    max-events: 100
  timezone: ${APP_TIMEZONE:Europe/Warsaw}
