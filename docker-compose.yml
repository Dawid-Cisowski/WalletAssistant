version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-assistant-postgres
    environment:
      POSTGRES_DB: wallet_assistant
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallet-assistant-network

volumes:
  postgres_data:
    driver: local

networks:
  wallet-assistant-network:
    driver: bridge
